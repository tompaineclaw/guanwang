<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="建峰亿腾办公室地址：湖南省湘潭市九华经开区创新创业中心 2 楼">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="50%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#0a1224"/>
    </linearGradient>
    <linearGradient id="park" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f3a2e"/>
      <stop offset="100%" stop-color="#162a20"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="100%" stop-color="#102844"/>
    </linearGradient>
    <linearGradient id="redMarker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- 网格道路 -->
  <g stroke="#2a3a5e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="700" y1="0" x2="700" y2="480"/>
  </g>

  <!-- 主道路（白色加粗） -->
  <g stroke="#dde6f5" stroke-linecap="round" fill="none">
    <path d="M 60 340 L 740 320" stroke-width="14" opacity="0.85"/>
    <path d="M 60 340 L 740 320" stroke="#a8b8d0" stroke-width="2" opacity="0.7"/>
    <path d="M 380 60 L 400 420" stroke-width="14" opacity="0.85"/>
    <path d="M 380 60 L 400 420" stroke="#a8b8d0" stroke-width="2" opacity="0.7"/>
    <path d="M 100 60 Q 220 100 360 80" stroke-width="8" opacity="0.7"/>
    <path d="M 460 120 Q 600 140 700 80" stroke-width="8" opacity="0.7"/>
    <path d="M 140 440 Q 280 460 480 440" stroke-width="8" opacity="0.7"/>
  </g>

  <!-- 河流/水系 -->
  <path d="M 0 100 Q 200 60 400 90 T 800 100 L 800 140 Q 600 120 400 140 T 0 130 Z" fill="url(#water)" opacity="0.7"/>
  <path d="M 720 200 Q 760 280 720 380 Q 700 440 740 480 L 800 480 L 800 180 Z" fill="url(#water)" opacity="0.7"/>

  <!-- 公园 / 绿地 -->
  <ellipse cx="180" cy="200" rx="80" ry="55" fill="url(#park)" opacity="0.85"/>
  <ellipse cx="640" cy="380" rx="65" ry="40" fill="url(#park)" opacity="0.7"/>

  <!-- 楼宇/街区 -->
  <g fill="#243456" opacity="0.6">
    <rect x="220" y="180" width="40" height="22" rx="2"/>
    <rect x="270" y="180" width="36" height="22" rx="2"/>
    <rect x="220" y="210" width="86" height="18" rx="2"/>
    <rect x="500" y="220" width="30" height="20" rx="2"/>
    <rect x="540" y="220" width="40" height="20" rx="2"/>
    <rect x="500" y="250" width="80" height="22" rx="2"/>
    <rect x="320" y="320" width="32" height="20" rx="2"/>
    <rect x="360" y="320" width="40" height="20" rx="2"/>
    <rect x="600" y="160" width="32" height="22" rx="2"/>
    <rect x="640" y="160" width="40" height="22" rx="2"/>
  </g>

  <!-- 红点 marker shadow -->
  <ellipse cx="400" cy="280" rx="22" ry="6" fill="rgba(0,0,0,0.45)" filter="url(#glow)"/>

  <!-- 红点 marker pin -->
  <g transform="translate(400 240)">
    <circle r="22" fill="rgba(230,57,70,0.25)"/>
    <path d="M 0 -32 C -16 -32 -22 -18 -22 -8 C -22 6 -10 18 0 32 C 10 18 22 6 22 -8 C 22 -18 16 -32 0 -32 Z"
          fill="url(#redMarker)"/>
    <circle cx="0" cy="-12" r="8" fill="white"/>
  </g>

  <!-- marker label box -->
  <g transform="translate(400 200)">
    <rect x="-110" y="-20" width="220" height="36" rx="18" fill="rgba(0,0,0,0.65)" stroke="rgba(255,255,255,0.18)"/>
    <text x="0" y="-2" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, sans-serif">建峰亿腾 · 湘潭办公室</text>
    <text x="0" y="14" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="10" font-family="-apple-system, BlinkMacSystemFont, sans-serif">九华经开区 · 创新创业中心 2F</text>
  </g>

  <!-- 比例尺 -->
  <g transform="translate(40 440)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="white" stroke-width="2"/>
    <line x1="60" y1="-4" x2="60" y2="4" stroke="white" stroke-width="2"/>
    <text x="30" y="-8" text-anchor="middle" fill="white" font-size="10" font-family="-apple-system, BlinkMacSystemFont, sans-serif">200 m</text>
  </g>

  <!-- N indicator -->
  <g transform="translate(750 50)">
    <circle r="20" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.3)"/>
    <polygon points="0,-12 4,4 0,0 -4,4" fill="#ff6b6b"/>
    <text x="0" y="13" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, sans-serif">N</text>
  </g>

  <!-- 角落装饰 -->
  <text x="760" y="468" text-anchor="end" fill="rgba(255,255,255,0.35)" font-size="9" font-family="-apple-system, BlinkMacSystemFont, sans-serif">© OpenStreetMap · 建峰亿腾</text>
</svg>
